<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
  </defs>

  <!-- Dark background square with rounded corners -->
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="100" height="100" rx="18" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- Outer diamond glow -->
  <polygon
    points="50,12 88,50 50,88 12,50"
    fill="#e8ff47"
    filter="url(#softglow)"
    opacity="0.9"
  />
  <!-- Inner diamond cutout -->
  <polygon
    points="50,26 74,50 50,74 26,50"
    fill="#080808"
  />
  <!-- Center dot -->
  <circle cx="50" cy="50" r="7" fill="#e8ff47" filter="url(#glow)"/>
</svg>
